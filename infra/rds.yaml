AWSTemplateFormatVersion: '2010-09-09'
Description: Zcout RDS PostgreSQL (free tier) - separate stack for catalog data

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where EC2 and RDS live
  SubnetIdA:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet A for RDS
  SubnetIdB:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet B for RDS (different AZ)
  Ec2SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security Group of your EC2 (source allowed to DB)
  DbName:
    Type: String
    Default: zcout
  MasterUsername:
    Type: String
    Default: zcout
  MasterUserPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: Master password for Postgres (will not be shown)

Resources:
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for Zcout RDS
      SubnetIds:
        - !Ref SubnetIdA
        - !Ref SubnetIdB

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow Postgres from EC2 SG only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref Ec2SecurityGroupId

  PostgresInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: postgres
      EngineVersion: '16.4'
      DBInstanceClass: db.t3.micro
      AllocatedStorage: '20'
      StorageType: gp3
      DBName: !Ref DbName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      PubliclyAccessible: false
      VPCSecurityGroups:
        - !GetAtt RdsSecurityGroup.GroupId
      DBSubnetGroupName: !Ref DbSubnetGroup
      DeletionProtection: false
      MultiAZ: false
      BackupRetentionPeriod: 1
      AutoMinorVersionUpgrade: true

Outputs:
  EndpointAddress:
    Value: !GetAtt PostgresInstance.Endpoint.Address
    Description: RDS endpoint hostname
  EndpointPort:
    Value: !GetAtt PostgresInstance.Endpoint.Port
    Description: RDS endpoint port
