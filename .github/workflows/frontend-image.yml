name: Build and Push Frontend Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/karolsakwa/zcout-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ secrets.NEXT_PUBLIC_API_BASE }}
            NEXT_PUBLIC_APP_ORIGIN=${{ secrets.NEXT_PUBLIC_APP_ORIGIN }}
            NEXT_PUBLIC_ENABLE_WS=${{ secrets.NEXT_PUBLIC_ENABLE_WS }}
            NEXT_PUBLIC_PUSHER_APP_KEY=${{ secrets.NEXT_PUBLIC_PUSHER_APP_KEY }}
            NEXT_PUBLIC_PUSHER_HOST=${{ secrets.NEXT_PUBLIC_PUSHER_HOST }}
            NEXT_PUBLIC_PUSHER_PORT=${{ secrets.NEXT_PUBLIC_PUSHER_PORT }}
            NEXT_PUBLIC_PUSHER_SCHEME=${{ secrets.NEXT_PUBLIC_PUSHER_SCHEME }}
            NEXT_PUBLIC_PUSHER_APP_CLUSTER=${{ secrets.NEXT_PUBLIC_PUSHER_APP_CLUSTER }}